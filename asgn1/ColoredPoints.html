<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Change a point color</title>
  </head>

  <body onload="main()">
    <canvas id="webgl" width="400" height="400">
    Please use a browser that supports "canvas"
    </canvas>

    <img src="drawingFoxReference.jpg" style="max-width: 300px" >


    <br>
    
    <button type="button" id="undo">Undo</button>
    
    <br>

    <button type="button" id="green">Green</button>
    <button type="button" id="red">Red</button>

    <button type="button" id="clear">Clear</button>

    <br>
    <button type="button" id="point">Point</button>
    <button type="button" id="triangle">Triangle</button>
    <button type="button" id="circle">Circle</button>

    <br>
    Red <input type="range" min="0" max="100" value="100" class="slider" id="redSlide">
    <br>
    Green <input type="range" min="0" max="100" value="100" class="slider" id="greenSlide">
    <br>
    Blue <input type="range" min="0" max="100" value="100" class="slider" id="blueSlide">

    <br><br>
    Size <input type="range" min="0" max="100" value="100" class="slider" id="sizeSlide">
    
    <br>
    Circle Segments <input type="range" min="0" max="100" value="100" class="slider" id="cirSegSlide">

    <br>
    Opacity (Transparency)  <input type="range" min="0" max="100" value="100" class="slider" id="opacitySlide">
    
    <br>
    <button type="Art" id="art">Art</button>

    <script src="./lib/webgl-utils.js"></script>
    <script src="./lib/webgl-debug.js"></script>
    <script src="./lib/cuon-utils.js"></script>
    <script src="ColoredPoints.js"></script>
    <script src="Circle.js"></script>
    <script src="Triangle.js"></script>
    <script src="ModifiedTriangle.js"></script>
    <script src="Point.js"></script>
  </body>
</html>
