<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title> Painting </title>
  </head>

  <body onload="main()">
    <style>
      .container {
        display: flex;
      }
      .container div {
        margin: 10px;
      }

    </style>
    <div style="padding-left:10px">
      Emily Mayer <br>
      etmayer@ucsc.edu <br>
      Notes: <br>

      <div style="padding-left:10px">
        Added undo button and transparency/opacity slider
      </div>

    </div>

    <div class="container"> 
      <div style="display: inline-block"> 
        <canvas id="webgl" width="400" height="400">
        Please use a browser that supports "canvas"
        </canvas>
      </div>

      <div style="display: inline-block"> 
        Drawing Reference: <br>
        <img src="drawingMantisReference.jpg" style="max-width: 300px">
        <br>
        Drawing:
        <br>
        <button type="Art" id="art">Mantis</button>
      </div>
    </div>

    <br>
    
    <button type="button" id="undo">Undo</button>
    <button type="button" id="clear">Clear Canvas</button>

    <br><br>
    Drawing Mode:
    <br>
    <button type="button" id="point">Square</button>
    <button type="button" id="triangle">Triangle</button>
    <button type="button" id="circle">Circle</button>

    <br><br>
    Shape Color:
    <br>
    Red <input type="range" min="0" max="100" value="100" class="slider" id="redSlide">
    <br>
    Green <input type="range" min="0" max="100" value="100" class="slider" id="greenSlide">
    <br>
    Blue <input type="range" min="0" max="100" value="100" class="slider" id="blueSlide">

    <br><br>
    Shape Size: <input type="range" min="0" max="100" value="100" class="slider" id="sizeSlide">
    
    <br>
    Circles Segment Count <input type="range" min="0" max="100" value="100" class="slider" id="cirSegSlide">

    <br>
    Opacity (Transparent) <input type="range" min="0" max="100" value="100" class="slider" id="opacitySlide">

    <script src="../lib/webgl-utils.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <script src="../lib/cuon-utils.js"></script>
    <script src="asg1.js"></script>
    <script src="Circle.js"></script>
    <script src="Triangle.js"></script>
    <script src="ModifiedTriangle.js"></script>
    <script src="Point.js"></script>
  </body>
</html>
