<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Draw a blue rectangle (canvas version)</title>
  </head>

  <body onload="main()">
    <header>
      Emily Mayer <br>
      etmayer@ucsc.edu <br>
      Notes: None <br>
    </header>
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>
    <script src="./lib/cuon-matrix-cse160.js"></script>
    <script src="asg0.js"></script>

    <br>
    <lable>v1:</lable>

    <label for="v1x-name">x</label>
    <input type="text" id="v1x-name" name="v1x-name">

    <label for="v1y-name">y</label>
    <input type="text" id="v1y-name" name="v1y-name">
    <br>

    <label>v2:</label>

    <label for="v2x-name">x</label>
    <input type="text" id="v2x-name" name="v2x-name">

    <label for="v2y-name">y</label>
    <input type="text" id="v2y-name" name="v2y-name">

    <br>
    <input type="button" value="Draw" onclick="handleDrawEvent()">
    <br>
    <br>
    <label for="operation-select">Operation:</label>
    <select name="operation" id="operation">
      <option value="Add">Add</option>
      <option value="Subtract">Subtract</option>
      <option value="Multiply">Multiply</option>
      <option value="Divide">Divide</option>
      <option value="Magnitude">Magnitude</option>
      <option value="Normalize">Normalize</option>
      <option value="AngleBetween">Angle Between</option>
      <option value="Area">Area</option>

    </select>

    <label>Scalar:</label>
    <input type="text" id="scalar-num" name="scalar-num">
    <br>
    <input type="button" value="Draw" onclick="handleDrawOperationEvent()">
    <br>



  </body>
</html>
